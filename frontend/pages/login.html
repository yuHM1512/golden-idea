<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Ý Tưởng Vàng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
      <div class="card shadow" style="max-width: 440px; width: 100%">
        <div class="text-center p-4">
          <!-- Đặt logo Marex tại: frontend/static/Marex.png -->
          <a href="/menu">
            <img
              src="../static/Marex.png"
              alt="Marex"
              class="img-fluid rounded"
              style="max-height: 120px; width: 100%; object-fit: cover"
            />
          </a>
        </div>
        <div class="card-body p-4">
          <div id="loginAlert" class="alert d-none" role="alert"></div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Mã nhân viên</label>
            <input
              type="text"
              class="form-control"
              id="loginEmployeeCode"
              placeholder="Nhập mã nhân viên (ví dụ: A1234)"
              autocomplete="username"
              autofocus
            />
          </div>

          <button class="btn btn-primary w-100" id="loginButton" onclick="doLogin()">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
          </button>
          <div class="text-center mt-3">
            <small class="text-muted">Demo: nhập bất kỳ mã nhân viên nào để tiếp tục.</small>
          </div>
        </div>
      </div>
    </div>

    <script>
      if (localStorage.getItem("is_logged_in") === "true") {
        window.location.href = "menu";
      }

      function setAlert(message, type) {
        const el = document.getElementById("loginAlert");
        el.classList.remove("d-none", "alert-success", "alert-danger");
        el.classList.add(type === "success" ? "alert-success" : "alert-danger");
        el.textContent = message;
      }

      async function doLogin() {
        const code = document.getElementById("loginEmployeeCode").value.trim().toUpperCase();
        if (!code) {
          setAlert("Vui lòng nhập mã nhân viên", "error");
          return;
        }

        try {
          localStorage.setItem("employee_code", code);
          localStorage.setItem("is_logged_in", "true");
          setAlert("Đăng nhập thành công!", "success");
          setTimeout(() => {
            window.location.href = "menu";
          }, 600);
        } catch (e) {
          setAlert("Đăng nhập thất bại", "error");
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
